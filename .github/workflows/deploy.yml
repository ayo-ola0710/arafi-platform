name: Arafi Platform Live Continuous Deployment Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'arafi-api/**'
      - 'webhookreceiver/**'
      - '.github/workflows/**'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1

jobs:
  deploy-services:
    name: Build & Push Microservice Containers
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source Tracking Repository Tree
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud Registry
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Configure Docker CLI Authentication Credentials
      run: |
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    # ================================================================
    # TRACK A: CORE PLATFORM API SERVICE DEPLOYMENT
    # ================================================================
    - name: Build and Push Core API Container Image
      uses: docker/build-push-action@v5
      with:
        context: ./arafi-api
        push: true
        tags: us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/arafi-repo/arafi-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Launch Live API Instance onto Google Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: arafi-api
        image: us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/arafi-repo/arafi-api:${{ github.sha }}
        region: ${{ env.GCP_REGION }}
        flags: '--allow-unauthenticated'
        env_vars: |
          SPRING_DATASOURCE_URL=${{ secrets.LIVE_DB_URL }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.LIVE_DB_USER }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.LIVE_DB_PASS }}
          ARAFI_JWT_SECRET=${{ secrets.LIVE_JWT_SECRET }}
          NOMBA_ACCOUNT_ID=${{ secrets.NOMBA_ACCOUNT_ID }}
          NOMBA_SUB_ACCOUNT_ID=${{ secrets.NOMBA_SUB_ACCOUNT_ID }}
          NOMBA_TEST_CLIENT_ID=${{ secrets.NOMBA_TEST_CLIENT_ID }}
          NOMBA_TEST_PRIVATE_KEY=${{ secrets.NOMBA_TEST_PRIVATE_KEY }}
          NOMBA_LIVE_CLIENT_ID=${{ secrets.NOMBA_LIVE_CLIENT_ID }}
          NOMBA_LIVE_PRIVATE_KEY=${{ secrets.NOMBA_LIVE_PRIVATE_KEY }}
    # ================================================================
    # TRACK B: INBOUND EVENT WEBHOOK RECEIVER DEPLOYMENT
    # ================================================================
    - name: Build and Push Webhook Ingestion Container Image
      uses: docker/build-push-action@v5
      with:
        context: ./webhookreceiver
        push: true
        tags: us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/arafi-repo/webhook-receiver:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Launch Webhook Receiver Instance onto Google Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: arafi-webhook-receiver
        image: us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/arafi-repo/webhook-receiver:${{ github.sha }}
        region: ${{ env.GCP_REGION }}
        flags: '--allow-unauthenticated'
        env_vars: |
          SPRING_DATASOURCE_URL=${{ secrets.LIVE_DB_URL }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.LIVE_DB_USER }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.LIVE_DB_PASS }}
          NOMBA_SIGNING_KEY=${{ secrets.NOMBA_SIGNING_KEY }}