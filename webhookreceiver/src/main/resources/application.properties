# ====================================================================
# ARAFI WEBHOOK RECEIVER - UNIFIED PROPERTIES PROFILE
# ====================================================================
spring.application.name=webhookreceiver

# Cloud Run automatically handles container port injection. Locally defaults to 8081.
server.port=${PORT:8081}

# ====================================================================
# POSTGRESQL LAYER (NEON LINK)
# ====================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/arafi?options=-c%20search_path%3Darafi}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Transaction Controls
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=arafi
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_IDLE:5}

# ====================================================================
# CRYPTOGRAPHIC SIGNING KEYS
# ====================================================================
# Captures the raw secret key from Nomba to compute constant-time HMAC validations.
arafi.nomba.signing.key=${NOMBA_SIGNING_KEY}